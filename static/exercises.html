<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GYM-OPS · Exercise Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/hud.css">
</head>
<body>
    <header class="hud-topbar">
        <span class="brand">[ GYM-OPS ]</span>
        <nav>
            <a href="/">DASHBOARD</a>
            <a href="/exercises.html">CATALOG</a>
            <a href="/logger.html">LOGGER</a>
            <a href="/progress.html">PROGRESS</a>
            <a href="/running.html">RUNNING</a>
            <a href="/training.html">TRAINING</a>
            <a href="/sleep.html">SLEEP</a>
            <a href="/plan.html">PLAN</a>
        </nav>
        <div class="right">
            <span><span class="led led-green led-pulse" id="db-led"></span>&nbsp;<span id="db-status-text">DB ONLINE</span></span>
            <span id="clock-local">--</span>
        </div>
    </header>

    <main class="page stack-lg">
        <div class="page-head">
            <div>
                <span class="eyebrow">[ GYM-OPS // REFERENCE ]</span>
                <h1>Exercise catalog</h1>
            </div>
            <div class="head-readout" id="cat-count">…</div>
        </div>

        <section class="hud-panel">
            <div class="catalog-toolbar">
                <div class="field">
                    <label class="field-label" for="search">[ Search ]</label>
                    <input id="search" type="search" placeholder="Filter by name…" class="hud-input"
                           autocomplete="off" autocapitalize="off" spellcheck="false" />
                </div>
                <div class="field" style="flex:1 1 100%;">
                    <span class="field-label">[ Muscle group ]</span>
                    <div id="filter-chips" class="row-tight" role="group" aria-label="Filter by muscle group"></div>
                </div>
            </div>
        </section>

        <section id="grid" class="catalog-grid" aria-label="Exercises"></section>
    </main>

    <script src="/static/js/hud.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/exercises.js"></script>
</body>
</html>
