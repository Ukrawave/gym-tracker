<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GYM-OPS · Session Logger</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/hud.css">
</head>
<body>
    <header class="hud-topbar">
        <span class="brand">[ GYM-OPS ]</span>
        <nav>
            <a href="/">DASHBOARD</a>
            <a href="/exercises.html">CATALOG</a>
            <a href="/logger.html">LOGGER</a>
            <a href="/progress.html">PROGRESS</a>
            <a href="/running.html">RUNNING</a>
            <a href="/training.html">TRAINING</a>
            <a href="/sleep.html">SLEEP</a>
            <a href="/nutrition.html">NUTRITION</a>
            <a href="/plan.html">PLAN</a>
        </nav>
        <div class="right">
            <span><span class="led led-green led-pulse" id="db-led"></span>&nbsp;<span id="db-status-text">DB ONLINE</span></span>
            <span id="clock-local">--</span>
        </div>
    </header>

    <main class="page stack-lg">

        <div class="page-head">
            <div>
                <span class="eyebrow">[ GYM-OPS // SESSION LOGGER ]</span>
                <h1>Logger</h1>
            </div>
            <div class="head-readout">Log sets · drive the rest timer</div>
        </div>

        <!-- Split picker — shown only when no active session -->
        <section id="picker-panel" class="hud-panel">
            <div class="hud-panel-header">
                <h2>Start a session</h2>
                <span class="meta">Pick a training split</span>
            </div>
            <div id="split-buttons" class="row" role="group" aria-label="Training splits"></div>
        </section>

        <!-- Active session -->
        <section id="session-panel" class="hidden stack">
            <div class="hud-panel live">
                <div class="hud-panel-header">
                    <h2><span class="led led-green led-pulse"></span> Active session<span id="active-category" class="text-info"></span></h2>
                    <span class="meta">SID:<span id="active-session-id">--</span> · Start <span id="active-start"></span></span>
                </div>
                <div class="col">
                    <div class="field">
                        <label class="field-label" for="session-notes">[ Session notes ]</label>
                        <input id="session-notes" class="hud-input" placeholder="Optional — how did it feel?" />
                    </div>
                    <div class="row">
                        <button id="end-session" class="hud-btn success">[ END SESSION ]</button>
                        <button id="discard-session" class="hud-btn danger">[ DISCARD ]</button>
                    </div>
                </div>
            </div>

            <div class="logger-grid">
                <!-- Exercise lineup -->
                <div id="lineup" class="stack"></div>

                <!-- Sidebar: timer + add-exercise -->
                <aside class="logger-sidebar">
                    <div class="hud-panel">
                        <div class="hud-panel-header">
                            <h2><span class="led led-amber led-pulse"></span> Rest timer</h2>
                        </div>
                        <div id="timer-root"></div>
                    </div>
                    <div class="hud-panel">
                        <div class="hud-panel-header">
                            <h2>Add exercise</h2>
                        </div>
                        <div class="col">
                            <div class="field">
                                <label class="field-label" for="add-exercise-select">[ Exercise ]</label>
                                <select id="add-exercise-select" class="hud-select"></select>
                            </div>
                            <button id="add-exercise-btn" class="hud-btn">[ + ADD TO SESSION ]</button>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="/static/js/hud.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/logger.js"></script>
</body>
</html>
