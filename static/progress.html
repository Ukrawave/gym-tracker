<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GYM-OPS · Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/hud.css">
</head>
<body>
    <header class="hud-topbar">
        <span class="brand">[ GYM-OPS ]</span>
        <nav>
            <a href="/">DASHBOARD</a>
            <a href="/exercises.html">CATALOG</a>
            <a href="/logger.html">LOGGER</a>
            <a href="/progress.html">PROGRESS</a>
        </nav>
        <div class="right">
            <span><span class="led led-green led-pulse" id="db-led"></span>&nbsp;<span id="db-status-text">DB ONLINE</span></span>
            <span id="clock-local">--</span>
        </div>
    </header>

    <main class="page stack-lg">
        <section class="hud-panel">
            <div class="hud-panel-header">
                <h2>Exercise progression</h2>
                <span class="meta" id="exercise-meta">[ select an exercise ]</span>
            </div>
            <select id="exercise-picker" class="hud-select" style="max-width:480px;"></select>
        </section>

        <div class="grid grid-2">
            <div class="hud-panel">
                <div class="hud-panel-header">
                    <h2>Max weight</h2>
                    <span class="meta">Per session</span>
                </div>
                <div class="chart-wrap"><canvas id="chart-weight"></canvas></div>
            </div>
            <div class="hud-panel">
                <div class="hud-panel-header">
                    <h2>Estimated 1RM (Brzycki)</h2>
                    <span class="meta">Per session</span>
                </div>
                <div class="chart-wrap"><canvas id="chart-1rm"></canvas></div>
            </div>
        </div>

        <div class="hud-panel">
            <div class="hud-panel-header">
                <h2>Total volume</h2>
                <span class="meta">Per session</span>
            </div>
            <div class="chart-wrap tall"><canvas id="chart-volume"></canvas></div>
        </div>

        <section class="hud-panel">
            <div class="hud-panel-header">
                <h2>Personal records</h2>
                <span class="meta">Recent history</span>
            </div>
            <div id="pr-table"></div>
        </section>
    </main>

    <script src="/static/js/hud.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/progress.js"></script>
</body>
</html>
